<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mini Social — Login · Home · Messenger</title>
  <style>
    :root{--bg:#0b1220;--card:#071427;--accent:#06b6d4;--muted:#94a3b8}
    *{box-sizing:border-box;font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial}
    body{margin:0;min-height:100vh;background:linear-gradient(180deg,#071022,#061224);color:#e6eef8}
    .app{max-width:1000px;margin:28px auto;padding:18px}
    .layout{display:grid;grid-template-columns:320px 1fr 360px;gap:18px}
    .card{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);padding:16px;border-radius:12px;box-shadow:0 8px 30px rgba(2,6,23,0.6)}

    /* left (auth/profile) */
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:800;color:#04202a}
    h2{margin:8px 0}
    label{display:block;color:var(--muted);font-size:13px;margin:8px 0 6px}
    input,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit}
    button{padding:10px 12px;border-radius:10px;border:none;cursor:pointer;font-weight:700}
    .btn-primary{background:linear-gradient(90deg,var(--accent),#7c3aed);color:#04202a}
    .btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted)}
    .muted{color:var(--muted);font-size:13px}

    /* middle (feed) */
    .feed-post{display:flex;gap:12px;margin-bottom:12px}
    .avatar{width:44px;height:44px;border-radius:10px;background:#09314a;display:flex;align-items:center;justify-content:center;font-weight:700}
    .post-body{flex:1}
    .post-meta{font-size:13px;color:var(--muted);margin-bottom:6px}
    .post-text{background:rgba(255,255,255,0.02);padding:10px;border-radius:8px}

    /* right (chat) */
    .chat{display:flex;flex-direction:column;height:520px}
    .chat-window{flex:1;overflow:auto;padding:12px;background:linear-gradient(180deg,#051422,#04121b);border-radius:10px}
    .msg{display:inline-block;padding:8px 12px;border-radius:12px;margin:8px 0;max-width:75%}
    .from-me{background:linear-gradient(90deg,var(--accent),#7c3aed);color:#04202a;margin-left:auto}
    .from-them{background:rgba(255,255,255,0.04);color:inherit}
    .chat-input{display:flex;gap:8px;margin-top:10px}
    .small{font-size:13px;color:var(--muted)}

    @media (max-width:1060px){.layout{grid-template-columns:1fr;}.chat{height:360px}}
  </style>
</head>
<body>
  <div class="app">
    <div class="brand" style="margin-bottom:10px">
      <div class="logo">MS</div>
      <div>
        <div style="font-weight:800">Mini Social</div>
        <div class="muted">Login · Home · Messenger — client-only demo</div>
      </div>
    </div>

    <!-- LEFT: Auth / Profile -->
    <div class="card" id="left-card">
      <div id="auth-area">
        <h2 id="auth-title">Login</h2>

        <div id="login-form">
          <label>Username or Email</label>
          <input id="login-user" placeholder="admin or you@example.com">
          <label>Password</label>
          <input id="login-pass" type="password" placeholder="1234">
          <div style="display:flex;gap:8px;margin-top:10px">
            <button class="btn-primary" id="login-btn">Login</button>
            <button class="btn-ghost" id="open-register">Create account</button>
          </div>
          <div style="margin-top:10px" class="small muted">Demo credential: <strong>admin / 1234</strong></div>
        </div>

        <div id="register-form" style="display:none">
          <label>Full name</label>
          <input id="reg-name" placeholder="Your name">
          <label>Email</label>
          <input id="reg-email" placeholder="you@example.com">
          <label>Password</label>
          <input id="reg-pass" type="password">
          <div style="display:flex;gap:8px;margin-top:10px">
            <button class="btn-primary" id="reg-btn">Create</button>
            <button class="btn-ghost" id="open-login">Back</button>
          </div>
        </div>
      </div>

      <div id="profile-area" style="display:none">
        <h2>Your profile</h2>
        <div style="display:flex;gap:12px;align-items:center">
          <div class="avatar" id="pf-avatar">U</div>
          <div>
            <div id="pf-name" style="font-weight:700">User</div>
            <div class="muted small" id="pf-email">you@example.com</div>
          </div>
        </div>
        <div style="margin-top:12px;display:flex;gap:8px">
          <button class="btn-primary" id="btn-logout">Logout</button>
          <button class="btn-ghost" id="btn-clear">Clear Data</button>
        </div>
      </div>
    </div>

    <!-- MAIN APP: Feed + Messenger (hidden until login) -->
    <div id="main-app" style="display:none" class="layout">
      <!-- HOME FEED -->
      <div class="card">
        <h2>Home</h2>
        <button id="open-chat" class="btn btn-ghost" style="margin-bottom:8px">Open Messenger</button>
        <textarea id="post-text" rows="3" placeholder="What's on your mind?" style="resize:none"></textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn-primary" id="post-btn">Post</button>
          <button class="btn-ghost" id="refresh-feed">Refresh</button>
        </div>
        <div id="feed" style="margin-top:14px"></div>
      </div>

      <!-- MESSENGER -->
      <div class="card chat" id="chat-card" style="display:none">
        <h2>Messenger</h2>
        <div class="muted small">Chat syncs between tabs using localStorage (demo only)</div>
        <div id="chat-window" class="chat-window"></div>
        <div class="chat-input">
          <input id="chat-input" placeholder="Type a message...">
          <button id="chat-send" class="btn btn-primary">Send</button>
        </div>
      </div>
    </div>

    <div style="margin-top:18px" class="muted small">Tip: open this page in two browser tabs to see feed & chat sync.</div>
  </div>

  <script>
    function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
    function el(tag, cls){ const e=document.createElement(tag); if(cls) e.className=cls; return e; }

    const KEY_USER = 'mini_user';
    const KEY_SESSION = 'mini_session';
    const KEY_POSTS = 'mini_posts';
    const KEY_CHAT = 'mini_chat';

    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const authTitle = document.getElementById('auth-title');
    const profileArea = document.getElementById('profile-area');

    const loginUser = document.getElementById('login-user');
    const loginPass = document.getElementById('login-pass');
    const loginBtn = document.getElementById('login-btn');
    const openRegister = document.getElementById('open-register');

    const regName = document.getElementById('reg-name');
    const regEmail = document.getElementById('reg-email');
    const regPass = document.getElementById('reg-pass');
    const regBtn = document.getElementById('reg-btn');
    const openLogin = document.getElementById('open-login');

    const pfName = document.getElementById('pf-name');
    const pfEmail = document.getElementById('pf-email');
    const pfAvatar = document.getElementById('pf-avatar');
    const btnLogout = document.getElementById('btn-logout');
    const btnClear = document.getElementById('btn-clear');

    const postText = document.getElementById('post-text');
    const postBtn = document.getElementById('post-btn');
    const feed = document.getElementById('feed');
    const refreshFeed = document.getElementById('refresh-feed');

    const chatWindow = document.getElementById('chat-window');
    const chatInput = document.getElementById('chat-input');
    const chatSend = document.getElementById('chat-send');

    const mainApp = document.getElementById('main-app');
    const chatCard = document.getElementById('chat-card');
    const openChatBtn = document.getElementById('open-chat');

    const demo = { user:'admin', pass:'1234', name:'Administrator', email:'admin@example.com' };

    openRegister.addEventListener('click', ()=>{
      loginForm.style.display='none'; registerForm.style.display='block'; authTitle.textContent='Create account';
    });
    openLogin.addEventListener('click', ()=>{
      registerForm.style.display='none'; loginForm.style.display='block'; authTitle.textContent='Login';
    });

    regBtn.addEventListener('click', ()=>{
      const n=regName.value.trim(), e=regEmail.value.trim(), p=regPass.value;
      if(!n||!e||!p){ alert('Fill all fields'); return }
      const user = { name:n, email:e, user:e.split('@')[0], pass:p };
      localStorage.setItem(KEY_USER, JSON.stringify(user));
      alert('Account created — you can login now');
      openLogin.click();
    });

    loginBtn.addEventListener('click', ()=>{
      const u=loginUser.value.trim(), p=loginPass.value;
      const stored = JSON.parse(localStorage.getItem(KEY_USER) || 'null');
      if((u===demo.user || u===demo.email) && p===demo.pass){ startSession(demo); }
      else if(stored && (u===stored.user || u===stored.email) && p===stored.pass){ startSession(stored); }
      else alert('Invalid credentials');
    });

    function startSession(user){
      sessionStorage.setItem(KEY_SESSION, JSON.stringify(user));
      localStorage.setItem(KEY_SESSION, JSON.stringify(user));
      showProfile(user);
      mainApp.style.display = 'grid';
      loadFeed(); renderChat(getChat());
      alert('Login successful');
    }

    function showProfile(user){
      document.getElementById('auth-area').style.display='none';
      profileArea.style.display='block';
      pfName.textContent=user.name || user.user;
      pfEmail.textContent=user.email || user.user;
      pfAvatar.textContent=(user.name||user.user||'U').slice(0,1).toUpperCase();
    }

    btnLogout.addEventListener('click', ()=>{
      sessionStorage.removeItem(KEY_SESSION);
      localStorage.removeItem(KEY_SESSION);
      profileArea.style.display='none';
      mainApp.style.display='none';
      alert('Logged out');
    });

    btnClear.addEventListener('click', ()=>{
      if(confirm('Clear posts, chat, user?')){
        localStorage.removeItem(KEY_POSTS); localStorage.removeItem(KEY_CHAT); localStorage.removeItem(KEY_USER); localStorage.removeItem(KEY_SESSION);
        feed.innerHTML=''; chatWindow.innerHTML=''; alert('Cleared');
      }
    });

    // --- Feed ---
    function getPosts(){ return JSON.parse(localStorage.getItem(KEY_POSTS) || '[]'); }
    function savePosts(posts){ localStorage.setItem(KEY_POSTS, JSON.stringify(posts)); }
    postBtn.addEventListener('click', ()=>{
      const text = postText.value.trim(); if(!text) return;
      const session = JSON.parse(localStorage.getItem(KEY_SESSION) || '{}');
      const posts = getPosts();
      posts.unshift({id:uid(), user:session.user||'guest', name:session.name||'Guest', text, ts:Date.now()});
      savePosts(posts); postText.value=''; renderFeed(posts);
      localStorage.setItem('mini_posts_update', Date.now());
    });
    refreshFeed.addEventListener('click', loadFeed);
    function loadFeed(){ renderFeed(getPosts()); }
    function renderFeed(posts){ feed.innerHTML=''; posts.forEach(p=>{
      const row = el('div','feed-post');
      const av = el('div','avatar'); av.textContent=(p.name||p.user||'U')[0].toUpperCase();
      const body=el('div','post-body'); const meta=el('div','post-meta'); meta.textContent=`${p.name} · ${new Date(p.ts).toLocaleString()}`;
      const txt=el('div','post-text'); txt.textContent=p.text;
      body.appendChild(meta); body.appendChild(txt); row.appendChild(av); row.appendChild(body);
      feed.appendChild(row);
    });}

    // --- Chat ---
    function getChat(){ return JSON.parse(localStorage.getItem(KEY_CHAT)||'[]'); }
    function saveChat(list){ localStorage.setItem(KEY_CHAT, JSON.stringify(list)); }
    chatSend.addEventListener('click', sendChat);
    chatInput.addEventListener('keypress',(e)=>{if(e.key==='Enter'){sendChat(); e.preventDefault();}});
    function sendChat(){
      const text=chatInput.value.trim(); if(!text) return;
      const session=JSON.parse(localStorage.getItem(KEY_SESSION)||'{}');
      const list=getChat(); list.push({id:uid(), from:session.user||'guest', name:session.name||'Guest', text, ts:Date.now()});
      saveChat(list); chatInput.value=''; renderChat(list);
      localStorage.setItem('mini_chat_update', Date.now());
    }
    function renderChat(list){ chatWindow.innerHTML=''; list.forEach(m=>{
      const d=el('div'); d.className='msg '+((m.from===(JSON.parse(localStorage.getItem(KEY_SESSION)||'{}').user)?'from-me':'from-them'));
      d.textContent=`${m.name}: ${m.text}`; chatWindow.appendChild(d);
    }); scrollChatToBottom(); }
    function scrollChatToBottom(){ chatWindow.scrollTop=chatWindow.scrollHeight; }

    // --- Toggle Messenger ---
    openChatBtn.addEventListener('click', ()=>{
      if(chatCard.style.display==='none'){ chatCard.style.display='block'; openChatBtn.textContent='Hide Messenger'; }
      else{ chatCard.style.display='none'; openChatBtn.textContent='Open Messenger'; }
    });

    window.addEventListener('storage', ev=>{
      if(ev.key==='mini_posts_update') loadFeed();
      if(ev.key==='mini_chat_update') renderChat(getChat());
      if(ev.key===KEY_SESSION){
        const s=JSON.parse(localStorage.getItem(KEY_SESSION)||'null'); if(s) showProfile(s);
      }
    });

    (function init(){
      const s=JSON.parse(localStorage.getItem(KEY_SESSION)||'null')||JSON.parse(sessionStorage.getItem(KEY_SESSION)||'null');
      if(s){ showProfile(s); mainApp.style.display='grid'; loadFeed(); renderChat(getChat()); }
    })();
  </script>
</body>
</html>
